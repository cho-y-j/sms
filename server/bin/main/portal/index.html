<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BizConnect - 웹 문자</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="stylesheet" href="/portal/portal.css">
</head>
<body>

<!-- Login -->
<div id="loginPage" class="login-page">
    <div class="login-box">
        <h1 class="logo">Biz<span>Connect</span></h1>
        <p class="login-desc">웹에서 문자를 보내세요</p>
        <input class="input" id="loginPhone" placeholder="전화번호 또는 이메일" autocomplete="username">
        <input class="input" id="loginPassword" type="password" placeholder="비밀번호" autocomplete="current-password">
        <div id="loginError" class="error-msg"></div>
        <button class="btn btn-primary w-full" onclick="doLogin()">로그인</button>
        <p class="login-link">계정이 없으신가요? <a href="/" onclick="window.location.href='/';return true;">회원가입</a></p>
        <p style="text-align:center;font-size:10px;color:var(--text3);margin-top:12px;">(주)다인온 · BizConnect</p>
    </div>
</div>

<!-- App -->
<div id="appPage" style="display:none">
    <header class="topbar">
        <div class="topbar-inner">
            <a href="/portal" class="logo-sm">Biz<span>Connect</span></a>
            <nav class="tabs">
                <button class="tab active" data-page="sms" onclick="navigate('sms')"><svg class="tab-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span class="tab-txt">문자 보내기</span><span class="tab-short">문자</span></button>
                <button class="tab" data-page="contacts" onclick="navigate('contacts')"><svg class="tab-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg><span class="tab-txt">연락처</span><span class="tab-short">연락처</span></button>
                <button class="tab" data-page="templates" onclick="navigate('templates')"><svg class="tab-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M16 13H8"/><path d="M16 17H8"/></svg><span class="tab-txt">템플릿</span><span class="tab-short">템플릿</span></button>
                <button class="tab" data-page="history" onclick="navigate('history')"><svg class="tab-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg><span class="tab-txt">발송 이력</span><span class="tab-short">이력</span></button>
                <button class="tab" data-page="account" onclick="navigate('account')"><svg class="tab-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="8" r="4"/><path d="M4 21v-1a6 6 0 0 1 6-6h4a6 6 0 0 1 6 6v1"/></svg><span class="tab-txt">내 계정</span><span class="tab-short">계정</span></button>
            </nav>
            <button class="btn-logout" onclick="doLogout()">로그아웃</button>
        </div>
    </header>

    <main id="content" class="content"></main>
</div>

<div id="toastContainer" class="toast-container"></div>

<script src="/portal/portal.js"></script>
</body>
</html>
