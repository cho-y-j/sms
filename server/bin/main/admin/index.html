<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BizConnect 관리자</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
    <link rel="stylesheet" href="/admin/admin.css">
</head>
<body>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<!-- Login Page -->
<div class="login-container" id="loginPage" style="display:none;">
    <div class="login-box">
        <h1>BizConnect</h1>
        <p class="subtitle">관리자 로그인</p>
        <div class="form-group">
            <label>아이디</label>
            <input type="text" id="loginUsername" placeholder="관리자 아이디" autocomplete="username">
        </div>
        <div class="form-group">
            <label>비밀번호</label>
            <input type="password" id="loginPassword" placeholder="비밀번호" autocomplete="current-password"
                   onkeyup="if(event.key==='Enter')login()">
        </div>
        <button class="btn-login" onclick="login()">로그인</button>
        <div class="login-error" id="loginError"></div>
    </div>
</div>

<!-- App Page -->
<div class="app-container" id="appPage" style="display:none;">
    <!-- Sidebar -->
    <nav class="sidebar">
        <div class="sidebar-header">
            <h2>BizConnect</h2>
            <span>관리자 패널</span>
        </div>
        <div class="sidebar-nav">
            <div class="nav-item active" data-page="dashboard" onclick="navigate('dashboard')">
                <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg></span><span>대시보드</span>
            </div>
            <div class="nav-item" data-page="users" onclick="navigate('users')">
                <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></span><span>회원 관리</span>
            </div>
            <div class="nav-item" data-page="payments" onclick="navigate('payments')">
                <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg></span><span>결제 관리</span>
            </div>
            <div class="nav-item" data-page="usage" onclick="navigate('usage')">
                <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg></span><span>사용량 통계</span>
            </div>
            <div class="nav-item" data-page="config" onclick="navigate('config')">
                <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg></span><span>설정 관리</span>
            </div>
            <div class="nav-item" data-page="templates" onclick="navigate('templates')">
                <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M16 13H8"/><path d="M16 17H8"/></svg></span><span>템플릿 관리</span>
            </div>
            <div class="nav-item" data-page="sms-monitor" onclick="navigate('sms-monitor')">
                <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4.9 16.1a8 8 0 0 1 0-8.2"/><path d="M7.8 13.2a4 4 0 0 1 0-2.4"/><circle cx="12" cy="12" r="1.5"/><path d="M16.2 10.8a4 4 0 0 1 0 2.4"/><path d="M19.1 7.9a8 8 0 0 1 0 8.2"/></svg></span><span>발송 모니터</span>
            </div>
            <div class="nav-item" data-page="ai" onclick="navigate('ai')">
                <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="11" width="18" height="10" rx="2"/><circle cx="12" cy="5" r="2"/><path d="M12 7v4"/><path d="M8 16h.01"/><path d="M16 16h.01"/></svg></span><span>AI 설정</span>
            </div>
        </div>
        <div class="sidebar-footer">
            <button class="btn-logout" onclick="logout()">로그아웃</button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content" id="contentArea">
        <div class="loading">로딩 중...</div>
    </main>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modalContent"></div>
</div>

<script src="/admin/admin.js"></script>
</body>
</html>
